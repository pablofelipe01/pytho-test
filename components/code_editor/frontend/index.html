<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; padding: 8px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: transparent; }
  #wrap { display: flex; flex-direction: column; gap: 6px; }
  textarea {
    width: 100%; box-sizing: border-box;
    font-family: "SF Mono", "Menlo", "Consolas", "Courier New", monospace;
    font-size: 14px; line-height: 1.5;
    padding: 12px; border: 1px solid #d0d0d0; border-radius: 6px;
    resize: vertical; tab-size: 4; -moz-tab-size: 4;
    outline: none;
  }
  textarea:focus { border-color: #ff4b4b; box-shadow: 0 0 0 2px rgba(255,75,75,0.15); }
  .row { display: flex; align-items: center; gap: 12px; }
  button {
    padding: 8px 18px; background: #ff4b4b; color: #fff;
    border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
  }
  button:hover { background: #e63946; }
  .warn { color: #c1121f; font-size: 13px; min-height: 18px; }
  .hint { color: #888; font-size: 12px; }
</style>
</head>
<body>
<div id="wrap">
  <textarea id="code" placeholder=""></textarea>
  <div class="row">
    <button onclick="onSubmit()">▶ Ejecutar y calificar</button>
    <span id="warn" class="warn"></span>
  </div>
  <div class="hint">⚠️ Pegar, arrastrar y clic-derecho están deshabilitados. Debes escribir el código.</div>
</div>

<script>
  // ----- Streamlit component bridge -----
  function sendMessageToStreamlitClient(type, data) {
    const out = Object.assign({ isStreamlitMessage: true, type: type }, data);
    window.parent.postMessage(out, "*");
  }
  function init() { sendMessageToStreamlitClient("streamlit:componentReady", { apiVersion: 1 }); }
  function setFrameHeight(h) { sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: h }); }
  function sendValue(v) { sendMessageToStreamlitClient("streamlit:setComponentValue", { value: v, dataType: "json" }); }

  const ta = document.getElementById("code");
  const warn = document.getElementById("warn");

  function flash(msg) {
    warn.textContent = msg;
    clearTimeout(window._t);
    window._t = setTimeout(() => warn.textContent = "", 2500);
  }

  // ----- Bloqueos -----
  ta.addEventListener("paste",       e => { e.preventDefault(); flash("⚠️ Pegar deshabilitado"); });
  ta.addEventListener("drop",        e => { e.preventDefault(); flash("⚠️ Arrastrar deshabilitado"); });
  ta.addEventListener("dragover",    e => e.preventDefault());
  ta.addEventListener("contextmenu", e => { e.preventDefault(); flash("⚠️ Menú contextual deshabilitado"); });
  ta.addEventListener("keydown", e => {
    const k = (e.key || "").toLowerCase();
    if ((e.ctrlKey || e.metaKey) && k === "v") { e.preventDefault(); flash("⚠️ Ctrl/Cmd+V deshabilitado"); }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && k === "v") { e.preventDefault(); flash("⚠️ Pegado especial deshabilitado"); }
    // Permitir Tab dentro del textarea (4 espacios)
    if (k === "tab") {
      e.preventDefault();
      const s = ta.selectionStart, en = ta.selectionEnd;
      ta.value = ta.value.substring(0, s) + "    " + ta.value.substring(en);
      ta.selectionStart = ta.selectionEnd = s + 4;
    }
  });

  // ----- Recibir args desde Python (placeholder, default) -----
  let initialized = false;
  function onRender(event) {
    const data = event.detail;
    if (!initialized) {
      ta.placeholder = data.args.placeholder || "Escribe tu código aquí...";
      ta.style.height = (data.args.height || 320) + "px";
      ta.value = data.args.default || "";
      initialized = true;
    }
    setFrameHeight(document.documentElement.scrollHeight + 20);
  }
  window.addEventListener("message", e => {
    if (e.data.type === "streamlit:render") onRender({ detail: e.data });
  });

  function onSubmit() { sendValue(ta.value); }

  window.addEventListener("load", () => {
    init();
    setTimeout(() => setFrameHeight(document.documentElement.scrollHeight + 20), 100);
  });
</script>
</body>
</html>
